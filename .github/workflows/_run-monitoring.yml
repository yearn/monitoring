name: Run Monitoring Scripts

on:
  workflow_call:
    inputs:
      scripts:
        required: true
        type: string
        description: "Newline-separated list of scripts to run (blank lines and #comments ignored)"
      cache_file:
        required: false
        type: string
        default: ""
        description: "Cache file path (empty = no caching)"
      cache_key_prefix:
        required: false
        type: string
        default: ""
        description: "Cache key prefix for actions/cache"
      extra_env:
        required: false
        type: string
        default: ""
        description: "Extra env vars as KEY=VALUE lines, written to $GITHUB_ENV before scripts run"

permissions:
  contents: read

# ──────────────────────────────────────────────────────────────
# Superset of all env vars used across workflows.
# Adding an env var here for a secret that doesn't exist is harmless (empty string).
# When adding a new protocol/secret, add it HERE once and all workflows pick it up.
# ──────────────────────────────────────────────────────────────
env:
  # ── Provider URLs ──
  PROVIDER_URL_POLYGON: ${{ secrets.PROVIDER_URL }}
  PROVIDER_URL_POLYGON_1: ${{ secrets.PROVIDER_URL_POLYGON_1 }}
  PROVIDER_URL_POLYGON_2: ${{ secrets.PROVIDER_URL_POLYGON_2 }}
  PROVIDER_URL_OPTIMISM: ${{ secrets.PROVIDER_URL_OPTIMISM }}
  PROVIDER_URL_MAINNET: ${{ secrets.PROVIDER_URL_MAINNET }}
  PROVIDER_URL_MAINNET_1: ${{ secrets.PROVIDER_URL_MAINNET_1 }}
  PROVIDER_URL_MAINNET_2: ${{ secrets.PROVIDER_URL_MAINNET_2 }}
  PROVIDER_URL_MAINNET_3: ${{ secrets.PROVIDER_URL_MAINNET_3 }}
  PROVIDER_URL_ARBITRUM: ${{ secrets.PROVIDER_URL_ARBITRUM }}
  PROVIDER_URL_BASE: ${{ secrets.PROVIDER_URL_BASE }}
  PROVIDER_URL_BASE_1: ${{ secrets.PROVIDER_URL_BASE_1 }}
  PROVIDER_URL_BASE_2: ${{ secrets.PROVIDER_URL_BASE_2 }}
  PROVIDER_URL_KATANA: ${{ secrets.PROVIDER_URL_KATANA }}
  PROVIDER_URL_KATANA_1: ${{ secrets.PROVIDER_URL_KATANA_1 }}

  # ── Telegram Bot Tokens ──
  TELEGRAM_BOT_TOKEN_DEFAULT: ${{ secrets.TELEGRAM_BOT_TOKEN_DEFAULT }}
  TELEGRAM_BOT_TOKEN_3JANE: ${{ secrets.TELEGRAM_BOT_TOKEN_3JANE }}
  TELEGRAM_BOT_TOKEN_AAVE: ${{ secrets.TELEGRAM_BOT_TOKEN_AAVE }}
  TELEGRAM_BOT_TOKEN_COMP: ${{ secrets.TELEGRAM_BOT_TOKEN_COMP }}
  TELEGRAM_BOT_TOKEN_EULER: ${{ secrets.TELEGRAM_BOT_TOKEN_EULER }}
  TELEGRAM_BOT_TOKEN_LIDO: ${{ secrets.TELEGRAM_BOT_TOKEN_LIDO }}
  TELEGRAM_BOT_TOKEN_PEGS: ${{ secrets.TELEGRAM_BOT_TOKEN_PEGS }}
  TELEGRAM_BOT_TOKEN_PENDLE: ${{ secrets.TELEGRAM_BOT_TOKEN_PENDLE }}
  TELEGRAM_BOT_TOKEN_SPARK: ${{ secrets.TELEGRAM_BOT_TOKEN_SPARK }}

  # ── Telegram Chat IDs ──
  TELEGRAM_CHAT_ID_3JANE: ${{ secrets.TELEGRAM_CHAT_ID_3JANE }}
  TELEGRAM_CHAT_ID_AAVE: ${{ secrets.TELEGRAM_CHAT_ID_AAVE }}
  TELEGRAM_CHAT_ID_CAP: ${{ secrets.TELEGRAM_CHAT_ID_CAP }}
  TELEGRAM_CHAT_ID_COMP: ${{ secrets.TELEGRAM_CHAT_ID_COMP }}
  TELEGRAM_CHAT_ID_ETHENA: ${{ secrets.TELEGRAM_CHAT_ID_ETHENA }}
  TELEGRAM_CHAT_ID_EULER: ${{ secrets.TELEGRAM_CHAT_ID_EULER }}
  TELEGRAM_CHAT_ID_FLUID: ${{ secrets.TELEGRAM_CHAT_ID_FLUID }}
  TELEGRAM_CHAT_ID_INFINIFI: ${{ secrets.TELEGRAM_CHAT_ID_INFINIFI }}
  TELEGRAM_CHAT_ID_LIDO: ${{ secrets.TELEGRAM_CHAT_ID_LIDO }}
  TELEGRAM_CHAT_ID_LRT: ${{ secrets.TELEGRAM_CHAT_ID_LRT }}
  TELEGRAM_CHAT_ID_MAPLE: ${{ secrets.TELEGRAM_CHAT_ID_MAPLE }}
  TELEGRAM_CHAT_ID_MAKER: ${{ secrets.TELEGRAM_CHAT_ID_MAKER }}
  TELEGRAM_CHAT_ID_MORPHO: ${{ secrets.TELEGRAM_CHAT_ID_MORPHO }}
  TELEGRAM_CHAT_ID_PENDLE: ${{ secrets.TELEGRAM_CHAT_ID_PENDLE }}
  TELEGRAM_CHAT_ID_SPARK: ${{ secrets.TELEGRAM_CHAT_ID_SPARK }}
  TELEGRAM_CHAT_ID_USDAI: ${{ secrets.TELEGRAM_CHAT_ID_USDAI }}
  TELEGRAM_CHAT_ID_YEARN: ${{ secrets.TELEGRAM_CHAT_ID_YEARN }}
  TELEGRAM_CHAT_ID_YEARN_MS: ${{ secrets.TELEGRAM_CHAT_ID_YEARN_MS }}
  TELEGRAM_CHAT_ID_YEARN_TIMELOCK_INTERNAL: ${{ secrets.TELEGRAM_CHAT_ID_YEARN_TIMELOCK_INTERNAL }}

  # ── Telegram Topics (forum-style group routing) ──
  # These are non-sensitive config, so they use repo variables (vars.*) instead of secrets.
  TELEGRAM_CHAT_ID_TOPICS: ${{ vars.TELEGRAM_CHAT_ID_TOPICS }}
  TELEGRAM_TOPIC_ID_3JANE: ${{ vars.TELEGRAM_TOPIC_ID_3JANE }}
  TELEGRAM_TOPIC_ID_AAVE: ${{ vars.TELEGRAM_TOPIC_ID_AAVE }}
  TELEGRAM_TOPIC_ID_APYUSD: ${{ vars.TELEGRAM_TOPIC_ID_APYUSD }}
  TELEGRAM_TOPIC_ID_CAP: ${{ vars.TELEGRAM_TOPIC_ID_CAP }}
  TELEGRAM_TOPIC_ID_COMP: ${{ vars.TELEGRAM_TOPIC_ID_COMP }}
  TELEGRAM_TOPIC_ID_ETHENA: ${{ vars.TELEGRAM_TOPIC_ID_ETHENA }}
  TELEGRAM_TOPIC_ID_EULER: ${{ vars.TELEGRAM_TOPIC_ID_EULER }}
  TELEGRAM_TOPIC_ID_FLUID: ${{ vars.TELEGRAM_TOPIC_ID_FLUID }}
  TELEGRAM_TOPIC_ID_INFINIFI: ${{ vars.TELEGRAM_TOPIC_ID_INFINIFI }}
  TELEGRAM_TOPIC_ID_LIDO: ${{ vars.TELEGRAM_TOPIC_ID_LIDO }}
  TELEGRAM_TOPIC_ID_LRT: ${{ vars.TELEGRAM_TOPIC_ID_LRT }}
  TELEGRAM_TOPIC_ID_MAKER: ${{ vars.TELEGRAM_TOPIC_ID_MAKER }}
  TELEGRAM_TOPIC_ID_MAPLE: ${{ vars.TELEGRAM_TOPIC_ID_MAPLE }}
  TELEGRAM_TOPIC_ID_MORPHO: ${{ vars.TELEGRAM_TOPIC_ID_MORPHO }}
  TELEGRAM_TOPIC_ID_PENDLE: ${{ vars.TELEGRAM_TOPIC_ID_PENDLE }}
  TELEGRAM_TOPIC_ID_RTOKEN: ${{ vars.TELEGRAM_TOPIC_ID_RTOKEN }}
  TELEGRAM_TOPIC_ID_STRATA: ${{ vars.TELEGRAM_TOPIC_ID_STRATA }}
  TELEGRAM_TOPIC_ID_USTB: ${{ vars.TELEGRAM_TOPIC_ID_USTB }}
  TELEGRAM_TOPIC_ID_USDAI: ${{ vars.TELEGRAM_TOPIC_ID_USDAI }}
  TELEGRAM_TOPIC_ID_YEARN: ${{ vars.TELEGRAM_TOPIC_ID_YEARN }}
  TELEGRAM_TOPIC_ID_YEARN_TIMELOCK: ${{ vars.TELEGRAM_TOPIC_ID_YEARN_TIMELOCK }}

  # ── GitHub PAT (dispatch) ──
  PAT_DISPATCH: ${{ secrets.PAT_DISPATCH }}

  # ── API Keys ──
  GRAPH_API_KEY: ${{ secrets.GRAPH_API_KEY }}
  TALLY_API_KEY: ${{ secrets.TALLY_API_KEY }}
  ETHERSCAN_TOKEN: ${{ secrets.ETHERSCAN_TOKEN }}
  POLYGONSCAN_TOKEN: ${{ secrets.POLYGONSCAN_TOKEN }}
  OPTIMISMSCAN_TOKEN: ${{ secrets.OPTIMISMSCAN_TOKEN }}
  ARBISCAN_TOKEN: ${{ secrets.ARBISCAN_TOKEN }}
  ENVIO_GRAPHQL_URL: ${{ secrets.ENVIO_GRAPHQL_URL }}
  COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
  TENDERLY_API_KEY: ${{ secrets.TENDERLY_API_KEY }}
  SAFE_API_KEY: ${{ secrets.SAFE_API_KEY }}
  SAFE_API_KEY_2: ${{ secrets.SAFE_API_KEY_2 }}
  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
  LLM_MODEL: ${{ secrets.LLM_MODEL }}
  LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
  DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
  DUNE_LARGE_TRANSFERS_QUERY_ID: ${{ vars.DUNE_LARGE_TRANSFERS_QUERY_ID }}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --extra ai

      - name: Set extra environment variables
        if: inputs.extra_env != ''
        env:
          EXTRA_ENV: ${{ inputs.extra_env }}
        run: |
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            if [[ ! "$line" =~ ^[A-Za-z_][A-Za-z0-9_]*= ]]; then
              echo "Invalid environment assignment: $line" >&2
              exit 1
            fi
            printf '%s\n' "$line" >> "$GITHUB_ENV"
          done <<< "$EXTRA_ENV"

      - name: Restore cache
        if: inputs.cache_file != ''
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ inputs.cache_file }}
          key: ${{ inputs.cache_key_prefix }}-${{ hashFiles(inputs.cache_file) }}
          restore-keys: |
            ${{ inputs.cache_key_prefix }}-

      # Shared 4byte selector cache. Lives outside the per-workflow `cache_file`
      # because every workflow's Sourcify hits are equally valid to every other
      # workflow's: selectors are deterministic, chain-agnostic, and identical
      # across all callers. One shared key means the hourly run warms up the
      # cache for the multisig-checker, the timelock alerts, etc.
      - name: Restore selector cache
        id: selector-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: selector-cache.txt
          key: selector-cache-v1-${{ hashFiles('selector-cache.txt') }}
          restore-keys: |
            selector-cache-v1-

      - name: Get initial cache hash
        if: inputs.cache_file != ''
        id: initial-hash
        env:
          CACHE_HASH: ${{ hashFiles(inputs.cache_file) }}
        run: echo "hash=$CACHE_HASH" >> "$GITHUB_OUTPUT"

      - name: Get initial selector-cache hash
        id: initial-selector-hash
        env:
          CACHE_HASH: ${{ hashFiles('selector-cache.txt') }}
        run: echo "hash=$CACHE_HASH" >> "$GITHUB_OUTPUT"

      - name: Run monitoring scripts
        env:
          SCRIPTS: ${{ inputs.scripts }}
        run: |
          while IFS= read -r script; do
            script=$(echo "$script" | xargs)
            [[ -z "$script" || "$script" == \#* ]] && continue
            if [[ ! "$script" =~ ^[A-Za-z0-9_./-]+$ ]]; then
              echo "Invalid script path: $script" >&2
              exit 1
            fi
            echo "::group::Running: $script"
            uv run "$script"
            echo "::endgroup::"
          done <<< "$SCRIPTS"

      - name: Get final cache hash
        if: inputs.cache_file != ''
        id: final-hash
        env:
          CACHE_HASH: ${{ hashFiles(inputs.cache_file) }}
        run: echo "hash=$CACHE_HASH" >> "$GITHUB_OUTPUT"

      - name: Get final selector-cache hash
        id: final-selector-hash
        env:
          CACHE_HASH: ${{ hashFiles('selector-cache.txt') }}
        run: echo "hash=$CACHE_HASH" >> "$GITHUB_OUTPUT"

      - name: Save cache
        if: always() && inputs.cache_file != '' && steps.initial-hash.outputs.hash != steps.final-hash.outputs.hash
        uses: actions/cache/save@v5
        with:
          path: ${{ inputs.cache_file }}
          key: ${{ inputs.cache_key_prefix }}-${{ hashFiles(inputs.cache_file) }}

      # Only save when the file actually grew/changed and isn't empty. Concurrent
      # workflows racing on save are handled by actions/cache@v5 — first writer
      # with a given key wins, others no-op silently.
      - name: Save selector cache
        if: always() && steps.initial-selector-hash.outputs.hash != steps.final-selector-hash.outputs.hash && steps.final-selector-hash.outputs.hash != ''
        uses: actions/cache/save@v5
        with:
          path: selector-cache.txt
          key: selector-cache-v1-${{ hashFiles('selector-cache.txt') }}
