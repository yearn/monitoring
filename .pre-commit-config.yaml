# Pre-commit hooks. Compatible with both `pre-commit` and `prek` (https://github.com/j178/prek).
# Install the git hook with:  prek install   (or)   pre-commit install
# Run against all files with:  prek run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in sync with the ruff version pinned in pyproject.toml [dev].
    rev: v0.15.12
    hooks:
      # Lint (with autofix), then format — mirrors the CI checks.
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
