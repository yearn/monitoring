# Single source of truth for scheduled monitoring runs on the VPS.
#
# Consumed by:
#   - `python -m automation list | render-crontab | run <profile>` (CLI)
#   - the yearn-monitor systemd unit, whose ExecStartPre renders this into a supercronic
#     crontab on start (see deploy/runbook.md).
#
# Adding or removing a script: edit the relevant profile's `tasks:`, then `git pull` on the
# VPS and `sudo systemctl restart yearn-monitor` to re-render the crontab.
#
# Each task invokes one script. CLI flags go under `args:` as `key: value` and are emitted as
# `--key=value` in the declared order. Cache files resolve against $CACHE_DIR (set to
# /srv/cache by the systemd unit; see utils/cache.py), so profiles only override a cache
# *basename* when they need an isolated file (e.g. daily).

profiles:

  hourly:
    cron: "11 * * * *"
    description: "Hourly monitoring (was .github/workflows/hourly.yml)."
    # No env override: alert dedupe and morpho rows share the default cache-id.txt
    # under $CACHE_DIR.
    tasks:
      - { name: "3jane",                  script: 3jane/main.py }
      - { name: "morpho-markets",         script: morpho/markets.py }
      - { name: "aave",                   script: aave/main.py }
      - { name: "lido-steth",             script: lido/steth/main.py }
      - { name: "lrt-pegs-curve",         script: lrt-pegs/curve/main.py }
      - { name: "lrt-pegs-fluid",         script: lrt-pegs/fluid/main.py }
      - { name: "rtoken",                 script: rtoken/monitor_rtoken.py }
      - { name: "lrt-pegs-origin",        script: lrt-pegs/origin_protocol.py }
      - { name: "infinifi",               script: infinifi/main.py }
      - { name: "usdai",                  script: usdai/main.py }
      - { name: "usdai-large-mints",      script: usdai/large_mints.py }
      - { name: "yearn-alert-large-flows", script: yearn/alert_large_flows.py }
      - { name: "maple",                  script: maple/main.py }
      - { name: "timelock-alerts",        script: timelock/timelock_alerts.py }
      # proposals scripts must run AFTER timelock-alerts (cache dedupe ordering).
      - { name: "aave-proposals",         script: aave/proposals.py }
      - { name: "ustb",                   script: ustb/main.py }
      - { name: "compound-proposals",     script: compound/proposals.py }
      - { name: "fluid-proposals",        script: fluid/proposals.py }
      - { name: "maker-proposals",        script: maker/proposals.py }

  yearn-stuck-triggers:
    cron: "15 * * * *"
    description: "Yearn stuck triggers (was the second job in hourly.yml)."
    # Cache file defaults to tks-trigger-cache.json under $CACHE_DIR (see
    # check_stuck_triggers.DEFAULT_CACHE_FILE), so no --cache-file override needed.
    tasks:
      - { name: "yearn-check-stuck-triggers", script: yearn/check_stuck_triggers.py }

  daily:
    cron: "19 8 * * *"
    description: "Daily monitoring (was .github/workflows/daily.yml)."
    env:
      # Isolated basenames (resolved under $CACHE_DIR) so a long daily run can't
      # race the hourly profile on the same file.
      CACHE_FILENAME: cache-id-daily.txt
      MORPHO_FILENAME: cache-id-daily.txt
    tasks:
      - { name: "morpho-governance",    script: morpho/governance.py }
      - { name: "ethena",               script: ethena/ethena.py }
      - { name: "strata",               script: strata/main.py }
      - { name: "cap-liquidity",        script: cap/liquidity.py }
      - { name: "tenderly",             script: utils/tenderly/tenderly.py }
      - { name: "yearn-check-shadow-debt", script: yearn/check_shadow_debt.py }
      - { name: "compound",             script: compound/main.py }

  weekly:
    cron: "25 10 * * 0"
    description: "Weekly monitoring (was .github/workflows/weekly.yml)."
    tasks:
      - { name: "yearn-check-endorsed", script: yearn/check_endorsed.py }

  multisig:
    cron: "0/10 * * * *"
    description: "Safe multisig polling every 10 minutes (was multisig-checker.yml)."
    # No env override: nonces land in the default nonces.txt under $CACHE_DIR.
    tasks:
      - { name: "safe",    script: safe/main.py }
      - { name: "stables", script: stables/main.py }
