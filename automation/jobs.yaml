# Single source of truth for scheduled monitoring runs on the VPS.
#
# Consumed by:
#   - `python -m automation list | render-crontab | run <profile>` (CLI)
#   - the yearn-monitor systemd unit, whose ExecStartPre renders this into a supercronic
#     crontab on start (see deploy/runbook.md).
#
# Adding or removing a script: edit the relevant profile's `tasks:` and merge to main. The
# multisig profile's pre-run sync (sync_before_run, below) lands it on the box within
# ~10 min — no restart needed. Only a `cron:` cadence change requires sync +
# `sudo systemctl restart monitoring` to re-render the crontab (see deploy/runbook.md).
#
# Each task invokes one script. CLI flags go under `args:` as `key: value` and are emitted as
# `--key=value` in the declared order. Cache files resolve against $CACHE_DIR (set to
# /srv/cache by the systemd unit; see utils/cache.py), so profiles only override a cache
# *basename* when they need an isolated file (e.g. daily).

profiles:

  hourly:
    cron: "5 * * * *"
    description: "Hourly monitoring (was .github/workflows/hourly.yml)."
    # No env override: alert dedupe and morpho rows share the default cache-id.txt
    # under $CACHE_DIR.
    tasks:
      - { name: "apyusd",                 script: protocols/apyusd/main.py }
      - { name: "3jane",                  script: protocols/3jane/main.py }
      - { name: "morpho-markets",         script: protocols/morpho/markets.py }
      - { name: "morpho-markets-v2",      script: protocols/morpho/markets_v2.py }
      - { name: "aave",                   script: protocols/aave/main.py }
      - { name: "spark",                  script: protocols/spark/main.py }
      - { name: "lido-steth",             script: protocols/lido/steth/main.py }
      - { name: "lrt-pegs-curve",         script: protocols/lrt-pegs/curve/main.py }
      - { name: "lrt-pegs-fluid",         script: protocols/lrt-pegs/fluid/main.py }
      - { name: "rtoken",                 script: protocols/rtoken/monitor_rtoken.py }
      - { name: "lrt-pegs-origin",        script: protocols/lrt-pegs/origin_protocol.py }
      - { name: "infinifi",               script: protocols/infinifi/main.py }
      - { name: "usdai",                  script: protocols/usdai/main.py }
      - { name: "usdai-large-mints",      script: protocols/usdai/large_mints.py }
      - { name: "stables-dune-large-transfers", script: protocols/stables/dune_large_transfers.py }
      - { name: "stables-oracles",         script: protocols/stables/oracles.py }
      - { name: "yearn-alert-large-flows", script: protocols/yearn/alert_large_flows.py }
      # Cache: tks-trigger-cache.json under $CACHE_DIR (check_stuck_triggers.DEFAULT_CACHE_FILE).
      - { name: "yearn-check-stuck-triggers", script: protocols/yearn/check_stuck_triggers.py, enabled: false }
      - { name: "maple",                  script: protocols/maple/main.py }
      - { name: "timelock-alerts",        script: protocols/timelock/timelock_alerts.py }
      # proposals scripts must run AFTER timelock-alerts (cache dedupe ordering).
      - { name: "aave-proposals",         script: protocols/aave/proposals.py }
      - { name: "ustb",                   script: protocols/ustb/main.py }
      - { name: "compound-proposals",     script: protocols/compound/proposals.py }
      - { name: "fluid-proposals",        script: protocols/fluid/proposals.py }
      - { name: "maker-proposals",        script: protocols/maker/proposals.py }
      - { name: "spark-proposals",        script: protocols/spark/proposals.py }

  daily:
    cron: "19 8 * * *"
    description: "Daily monitoring (was .github/workflows/daily.yml)."
    env:
      # Isolated basenames (resolved under $CACHE_DIR) so a long daily run can't
      # race the hourly profile on the same file.
      CACHE_FILENAME: cache-id-daily.txt
      MORPHO_FILENAME: cache-id-daily.txt
    tasks:
      - { name: "morpho-governance",    script: protocols/morpho/governance.py }
      - { name: "morpho-governance-v2", script: protocols/morpho/governance_v2.py }
      - { name: "ethena",               script: protocols/ethena/ethena.py }
      - { name: "strata",               script: protocols/strata/main.py }
      - { name: "cap-liquidity",        script: protocols/cap/liquidity.py }
      - { name: "tenderly",             script: utils/tenderly/tenderly.py }
      - { name: "yearn-check-shadow-debt", script: protocols/yearn/check_shadow_debt.py, enabled: false }
      - { name: "compound",             script: protocols/compound/main.py }
      - { name: "yearn-check-timelock-delay", script: protocols/yearn/check_timelock_delay.py }
      - { name: "prune-alerts",         script: utils/prune_alerts.py }

  multisig:
    cron: "0/10 * * * *"
    description: "Safe multisig polling every 10 minutes (was multisig-checker.yml)."
    # No env override: nonces land in the default nonces.txt under $CACHE_DIR.
    #
    # This is the box's code-sync heartbeat. Being the most frequent profile, a
    # forced sync to origin/main before it (sync_before_run) keeps the whole
    # checkout current at a 10-min cadence — every other profile re-spawns fresh
    # against whatever is on disk, so they ride along for free. Best-effort: a
    # failed sync is logged and the checks run anyway (see automation/git_sync.py).
    # Tracked local edits are intentionally discarded in favor of reviewed main.
    # NOTE: this lands new *code/config* only. Cron-cadence changes in this file
    # and dependency changes (pyproject.toml/uv.lock) still need a manual
    # `uv sync --frozen --extra ai` + `systemctl restart monitoring`.
    sync_before_run: true
    tasks:
      - { name: "safe",    script: protocols/safe/main.py }
      - { name: "stables", script: protocols/stables/main.py }
